name: Test

on: ["push", "pull_request"]

jobs:
  test:
    name: Run units tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Install
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
